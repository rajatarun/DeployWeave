name: Sandbox (Feature Branches)

on:
  push:
    branches-ignore:
      - main

permissions:
  id-token: write   # required for AWS OIDC token exchange
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest unit_tests.py -v

  deploy-sandbox:
    name: Deploy Sandbox
    runs-on: ubuntu-latest
    needs: test
    environment: sandbox
    outputs:
      stack-name: ${{ steps.stack-name.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Derive stack name from branch
        id: stack-name
        # CloudFormation stack names: alphanumeric + hyphens, max 128 chars.
        # Sanitise branch name: replace non-alphanumeric runs with hyphens,
        # lowercase, prefix, truncate so the full name stays under 128 chars.
        run: |
          BRANCH="${{ github.ref_name }}"
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//' | cut -c1-100)
          STACK="deployweave-sb-${SLUG}"
          echo "value=${STACK}" >> "$GITHUB_OUTPUT"
          echo "Stack name: ${STACK}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1
          role-session-name: deployweave-sb-${{ github.run_id }}

      - name: SAM Build
        run: sam build --use-container --template deployment.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ steps.stack-name.outputs.value }} \
            --parameter-overrides Environment=sandbox \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region us-east-1

  teardown-sandbox:
    name: Teardown Sandbox (60 min TTL)
    runs-on: ubuntu-latest
    needs: deploy-sandbox
    environment: sandbox
    if: always() && needs.deploy-sandbox.result == 'success'

    steps:
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1
          role-session-name: deployweave-sb-teardown-${{ github.run_id }}

      - name: Wait 60 minutes
        run: sleep 3600

      - name: Delete sandbox stack
        run: |
          sam delete \
            --stack-name ${{ needs.deploy-sandbox.outputs.stack-name }} \
            --no-prompts \
            --region us-east-1
