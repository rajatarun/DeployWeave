name: Deploy DeployWeave

on:
  push:
    branches:
      - main        # always deploys to prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [sandbox, dev, staging, prod]

permissions:
  id-token: write   # required for AWS OIDC token exchange
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest unit_tests.py -v

  deploy:
    name: SAM Deploy (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'prod' }}
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1
          role-session-name: deployweave-${{ env.TARGET_ENV }}-${{ github.run_id }}

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name deployweave-${{ env.TARGET_ENV }} \
            --parameter-overrides Environment=${{ env.TARGET_ENV }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region us-east-1

  # Sandbox stacks self-destruct after 1 hour.
  # This job holds the runner for 60 min then tears down the stack.
  sandbox-teardown:
    name: Sandbox Teardown (1 hr TTL)
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.inputs.environment == 'sandbox' }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1
          role-session-name: deployweave-sandbox-teardown-${{ github.run_id }}

      - name: Wait 1 hour
        run: sleep 3600

      - name: Delete sandbox stack
        run: |
          sam delete \
            --stack-name deployweave-sandbox \
            --no-prompts \
            --region us-east-1
